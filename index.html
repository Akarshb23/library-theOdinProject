<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>My Library</h1>
        <button id="newBookBtn">Add New Book</button>
    </header>

    <main>
        <div id="library-container"></div>
    </main>

    <dialog id="bookDialog">

        <form id="bookForm">

            <h2>Add Book</h2>

            <input
                type="text"
                id="title"
                placeholder="Book Title"
                required
            >

            <input
                type="text"
                id="author"
                placeholder="Author"
                required
            >

            <input
                type="number"
                id="pages"
                placeholder="Pages"
                required
            >

            <label>
                Read
                <input
                    type="checkbox"
                    id="read"
                >
            </label>

            <div class="form-buttons">
                <button type="submit">
                    Add Book
                </button>

                <button
                    type="button"
                    id="closeDialog"
                >
                    Cancel
                </button>
            </div>

        </form>

    </dialog>

    <script src="script.js"></script>
</body>
</html>
